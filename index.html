<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Aarav & Diya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="hero">
        <div class="overlay">
            <div class="hero-content" data-aos="zoom-out" data-aos-duration="2000">
                <p class="invite-text">SAVE THE DATE</p>
                <h1 class="couple-names">Aarav & Diya</h1>
                <div class="divider">✨</div>
                <p class="wedding-date">12 DECEMBER 2026</p>
                <button class="cta-btn" onclick="scrollToEvents()">View Events</button>
            </div>
        </div>
    </header>

    <section class="couple-section">
        <h2 class="section-title" data-aos="fade-up">The Happy Couple</h2>
        <div class="container flex-center">
            <div class="couple-card" data-aos="fade-right" data-aos-delay="300">
                <div class="img-frame">
                    <img src="groom.jpg" alt="Aarav"> 
                </div>
                <h3>Aarav</h3>
                <p>The Groom</p>
            </div>
            <div class="heart-icon" data-aos="zoom-in" data-aos-delay="500">❤️</div>
            <div class="couple-card" data-aos="fade-left" data-aos-delay="300">
                <div class="img-frame">
                    <img src="bride.jpg" alt="Diya">
                </div>
                <h3>Diya</h3>
                <p>The Bride</p>
            </div>
        </div>
    </section>

    <section id="events" class="events-section">
        <h2 class="section-title" data-aos="fade-up">Wedding Schedule</h2>
        <div class="container event-grid">
            <div class="event-box" data-aos="fade-up" data-aos-delay="200">
                <div class="event-icon">💍</div>
                <h3>Engagement</h3>
                <p>Dec 10, 2026 | 6:00 PM</p>
                <p>Grand Imperial Hotel, Delhi</p>
            </div>
            <div class="event-box" data-aos="fade-up" data-aos-delay="400">
                <div class="event-icon">🔥</div>
                <h3>The Wedding</h3>
                <p>Dec 12, 2026 | 7:00 PM</p>
                <p>Royal Garden, New Delhi</p>
            </div>
        </div>
    </section>

    <section class="location-section">
        <h2 class="section-title" data-aos="fade-up">Venue Location</h2>
        <div class="container" data-aos="zoom-in">
            <div class="map-wrapper">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14021.218320499033!2d77.2425!3d28.5292!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x390ce16467000001%3A0x6b772c67852f854b!2sSangam%20Vihar%2C%20New%20Delhi!5e0!3m2!1sen!2sin!4v1714550000000!5m2!1sen!2sin" 
                    width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy">
                </iframe>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1200,
            once: true
        });

        function scrollToEvents() {
            document.getElementById('events').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
